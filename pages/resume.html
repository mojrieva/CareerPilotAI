<!DOCTYPE html>
<html>

<head>

<title>CareerPilot AI - Resume Builder</title>

<style>

body{
font-family:Arial;
background:#e9eef5;
margin:0;
}

.container{
width:800px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,.1);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

input, textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
font-size:16px;
box-sizing:border-box;
}

textarea{
height:90px;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:14px 28px;
font-size:17px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#3d9140;
}

.cv{
margin-top:30px;
background:white;
padding:40px;
border:1px solid #ddd;
}

.name{
font-size:28px;
font-weight:bold;
}

.job{
font-size:18px;
color:#2e7d32;
margin-bottom:20px;
}

.section{
margin-top:20px;
}

.section h3{
border-bottom:1px solid #ccc;
padding-bottom:5px;
}

</style>

</head>

<body>

<div class="container">

<div class="top">
<h1>CareerPilot AI</h1>

<button onclick="window.location.href='../index.html'">
🏠 Home
</button>

</div>

<p>Create your professional CV in seconds</p>

<label>Full Name</label>
<input type="text" id="fullname">

<label>Job Title</label>
<input type="text" id="jobtitle">

<label>Skills</label>
<textarea id="skills"></textarea>

<label>Work Experience</label>
<textarea id="experience"></textarea>

<label>Education</label>
<textarea id="education"></textarea>

<button onclick="createCV()">Generate CV</button>

<button onclick="printCV()" style="margin-left:10px;background:#ff9800;">
🖨️ Print
</button>

<button onclick="downloadPDF()" style="margin-left:10px;background:#2196F3;">
📄 Download PDF
</button>
<div id="result"></div>

</div>

<script src="../js/script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>

</html>
